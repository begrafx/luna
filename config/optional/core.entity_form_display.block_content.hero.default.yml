langcode: en
status: true
dependencies:
  config:
    - block_content.type.hero
    - field.field.block_content.hero.field_hero_heading
    - field.field.block_content.hero.field_hero_subheading
    - field.field.block_content.hero.field_hero_cta_text
    - field.field.block_content.hero.field_hero_cta_url
    - field.field.block_content.hero.field_hero_style
  module:
    - block_content
    - link
    - options
    - text
id: block_content.hero.default
targetEntityType: block_content
bundle: hero
mode: default
content:
  info:
    type: string_textfield
    weight: -5
    region: content
    settings:
      size: 60
      placeholder: 'Block admin label (internal only)'
    third_party_settings: {}
  field_hero_heading:
    type: string_textfield
    weight: 1
    region: content
    settings:
      size: 60
      placeholder: 'e.g. Welcome to <em>Our Site</em>'
    third_party_settings: {}
  field_hero_subheading:
    type: string_textarea
    weight: 2
    region: content
    settings:
      rows: 3
      placeholder: 'A short description shown below the heading.'
    third_party_settings: {}
  field_hero_cta_text:
    type: string_textfield
    weight: 3
    region: content
    settings:
      size: 40
      placeholder: 'e.g. Get Started'
    third_party_settings: {}
  field_hero_cta_url:
    type: link_default
    weight: 4
    region: content
    settings:
      placeholder_url: 'e.g. /about or https://example.com'
      placeholder_title: ''
    third_party_settings: {}
  field_hero_style:
    type: options_select
    weight: 5
    region: content
    settings: {}
    third_party_settings: {}
hidden: {}
