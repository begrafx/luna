luna.mobile:
  label: mobile
  mediaQuery: ''
  weight: 0
  multipliers:
    - 1x

luna.narrow:
  label: narrow
  mediaQuery: 'all and (min-width: 576px)'
  weight: 1
  multipliers:
    - 1x
    - 2x

luna.wide:
  label: wide
  mediaQuery: 'all and (min-width: 768px)'
  weight: 2
  multipliers:
    - 1x
    - 2x

luna.wider:
  label: wider
  mediaQuery: 'all and (min-width: 992px)'
  weight: 3
  multipliers:
    - 1x
    - 2x

luna.widest:
  label: widest
  mediaQuery: 'all and (min-width: 1200px)'
  weight: 4
  multipliers:
    - 1x
    - 2x
